# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Pytest Local Repo CLI Devcontainer Across Versions

on:
  push:
    branches: [ "main" ]
    paths:
      - 'cli/src/pyghidra_mcp_cli/**'
      - 'cli/tests/**'
      - 'cli/pyproject.toml'
      - 'cli/Makefile'
      - '.github/workflows/pytest-devcontainer-repo-cli.yml'
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 5,15 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [
          "latest",
          "12.0ghidra3.13python-bookworm",
          "11.3.2ghidra3.12python-bookworm",
          "11.4.1ghidra3.11python-bookworm",
          "11.3ghidra3.10python-bookworm",
        ]

    steps:
    - uses: actions/checkout@v4

    - name: Overwrite original devcontainer with workflow devcontainer
      run: cp .github/workflows/devcontainer.json .devcontainer/devcontainer.json

    - name: Test CLI with pytest on devcontainer
      env:
        DC_IMAGE_TAG: ${{ matrix.image }}
      uses: devcontainers/ci@v0.3
      with:
        imageName: ghcr.io/clearbluejar/ghidra-python
        cacheFrom: ghcr.io/clearbluejar/ghidra-python
        imageTag: ${{ matrix.image }}
        push: never
        runCmd: |
          # Install uv first
          pip install --upgrade pip
          curl -LsSf https://astral.sh/uv/install.sh | sh
          export PATH="/root/.cargo/bin:$PATH"

          # Change to CLI directory
          cd cli

          # If Ghidra major version is 11, pin pyghidra==2.2.1 first
          if [[ "$GHIDRA_VERSION" == 11.* ]]; then
            echo "Detected Ghidra $GHIDRA_VERSION, pinning pyghidra==2.2.1..."
            uv add "pyghidra==2.2.1"
          fi

          # Install pyghidra-mcp main package first (required for integration tests)
          # uv pip install pyghidra-mcp

          # Install CLI dependencies with uv
          uv sync --extra dev

          # Run CLI tests using the CLI's test approach
          uv run pytest tests/unit/ -v --doctest-modules --junitxml=junit/unit-test-results-${{ matrix.image }}.xml
          uv run pytest tests/integration/ -v --doctest-modules --junitxml=junit/integration-test-results-${{ matrix.image }}.xml

    - name: Upload unit test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: cli-unit-test-results-${{ matrix.image }}
        path: junit/unit-test-results-${{ matrix.image }}.xml
        retention-days: 7

    - name: Upload integration test results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: cli-integration-test-results-${{ matrix.image }}
        path: junit/integration-test-results-${{ matrix.image }}.xml
        retention-days: 7

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      GHIDRA_RELEASE_API: https://api.github.com/repos/NationalSecurityAgency/ghidra/releases/latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: |
          cli/pyproject.toml
          cli/uv.lock

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"

    - name: Resolve latest Ghidra release asset
      id: ghidra-asset
      run: |
        python - <<'PY'
        import json
        import os
        import re
        import urllib.request

        api_url = os.environ["GHIDRA_RELEASE_API"]
        with urllib.request.urlopen(api_url) as resp:
            release_data = json.load(resp)

        asset = next(
            (
                candidate
                for candidate in release_data.get("assets", [])
                if re.match(r"ghidra_.*_PUBLIC_.*\.zip$", candidate["name"])
            ),
            None,
        )

        if asset is None:
            raise SystemExit("No Ghidra public zip asset found in latest release.")

        with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
            output.write(f"asset_name={asset['name']}\n")
            output.write(f"download_url={asset['browser_download_url']}\n")
        PY

    - name: Cache Ghidra
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/ghidra-download
          ${{ runner.temp }}/ghidra-install
        key: ${{ runner.os }}-ghidra-${{ steps.ghidra-asset.outputs.asset_name }}

    - name: Install Ghidra
      run: |
        set -euxo pipefail
        GHIDRA_DOWNLOAD_DIR="${RUNNER_TEMP}/ghidra-download"
        GHIDRA_INSTALL_ROOT="${RUNNER_TEMP}/ghidra-install"

        mkdir -p "${GHIDRA_DOWNLOAD_DIR}" "${GHIDRA_INSTALL_ROOT}"

        GHIDRA_ZIP="${GHIDRA_DOWNLOAD_DIR}/${{ steps.ghidra-asset.outputs.asset_name }}"
        if [ ! -f "${GHIDRA_ZIP}" ]; then
          curl -fsSL "${{ steps.ghidra-asset.outputs.download_url }}" -o "${GHIDRA_ZIP}"
        fi

        GHIDRA_DIR="$(find "${GHIDRA_INSTALL_ROOT}" -maxdepth 1 -type d -name 'ghidra_*_PUBLIC*' | head -n1 || true)"
        if [ -z "${GHIDRA_DIR}" ]; then
          unzip -q "${GHIDRA_ZIP}" -d "${GHIDRA_INSTALL_ROOT}"
          GHIDRA_DIR="$(find "${GHIDRA_INSTALL_ROOT}" -maxdepth 1 -type d -name 'ghidra_*_PUBLIC*' | head -n1)"
        fi

        xattr -dr com.apple.quarantine "${GHIDRA_DIR}" || true
        echo "GHIDRA_INSTALL_DIR=${GHIDRA_DIR}" >> "${GITHUB_ENV}"

    - name: Install uv
      run: pip install uv

    - name: Cache uv
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/uv
          cli/.venv
        key: ${{ runner.os }}-uv-${{ hashFiles('cli/uv.lock') }}

    - name: Install CLI dependencies
      working-directory: cli
      run: uv sync --extra dev

    - name: Run CLI unit tests on macOS
      working-directory: cli
      run: |
        mkdir -p junit
        uv run pytest tests/unit/ -v --doctest-modules --junitxml=junit/unit-test-results-macos.xml

    - name: Run CLI integration smoke tests on macOS
      working-directory: cli
      run: |
        mkdir -p junit
        uv run pytest tests/integration/test_cli_commands.py \
          -v \
          -k "test_list_binaries or test_decompile_function or test_search_symbols" \
          --junitxml=junit/integration-smoke-test-results-macos.xml

    - name: Upload CLI unit test results (macOS)
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: cli-unit-test-results-macos
        path: cli/junit/unit-test-results-macos.xml
        retention-days: 7

    - name: Upload CLI integration smoke test results (macOS)
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: cli-integration-smoke-test-results-macos
        path: cli/junit/integration-smoke-test-results-macos.xml
        retention-days: 7
